name: ci

on:
  push:
  pull_request:

jobs:
  cpu-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install CPU PyTorch and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.10.0 --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e '.[dev]' --no-deps
          python -m pip install 'pytest>=8'
      - name: Run tests
        run: PYTHONPATH=src python -m pytest -q

# GPU integration tests intentionally do not run in hosted CI. Their resolved
# configs, environment manifests, and compact reports are versioned separately.

